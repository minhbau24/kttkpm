{% extends 'catalog/base.html' %}
{% block title %}Đăng Ký - E-Shop Storefront{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Đăng Ký Tài Khoản</h2>
    <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Địa chỉ Email</label>
            <input type="email" name="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="role">Vai trò thành viên</label>
            <select name="role" id="role" class="form-control">
                <option value="customer" selected>Khách hàng (Customer)</option>
                <option value="staff">Nhân viên vận hành (Staff)</option>
            </select>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; padding:12px; font-weight:600;">Đăng Ký</button>
    </form>
    <div class="form-help">
        Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập ngay</a>
    </div>
</div>
{% endblock %}
